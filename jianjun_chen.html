<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jianjun Chen - Personal Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-1: #3b82f6;
            --accent-2: #8b5cf6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Blobs */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: 1;
            opacity: 0.5;
            animation: move 15s infinite alternate ease-in-out;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, var(--accent-1) 0%, transparent 60%);
            animation-delay: 0s;
        }

        .blob-2 {
            bottom: -10%;
            right: -10%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, var(--accent-2) 0%, transparent 60%);
            animation-delay: -5s;
        }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(10%, 15%) scale(1.1); }
            100% { transform: translate(-5%, 5%) scale(0.9); }
        }

        /* Glassmorphism Card */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 5rem 6rem;
            text-align: center;
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(30px);
            opacity: 0;
            animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7), 0 0 50px rgba(99, 102, 241, 0.15);
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Name Styling */
        .greeting {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-weight: 300;
            letter-spacing: 1px;
            animation: fadeIn 2s ease-out 0.5s both;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 700;
            margin-bottom: 2.5rem;
            background: linear-gradient(135deg, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
            animation: pulseText 4s infinite alternate ease-in-out;
        }

        @keyframes pulseText {
            0% { text-shadow: 0 0 20px rgba(165, 180, 252, 0); }
            100% { text-shadow: 0 0 25px rgba(165, 180, 252, 0.3); }
        }

        /* Time Styling */
        .time-container {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            position: relative;
            animation: fadeIn 2s ease-out 0.8s both;
        }

        .time {
            font-size: 6rem;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
            line-height: 1;
        }

        .date {
            margin-top: 1rem;
            font-size: 1.2rem;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
    </style>
</head>
<body>

    <!-- Ambient Animation Background -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Main Content -->
    <div class="card">
        <div class="greeting" id="greeting">Welcome,</div>
        <h1>jianjun_chen</h1>
        <div class="time-container">
            <div class="time" id="clock">00:00:00</div>
            <div class="date" id="date">Loading date...</div>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            
            // Format time with zeroes padding
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            // Format date string
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateStr = now.toLocaleDateString('en-US', options);

            // Update DOM
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
            document.getElementById('date').textContent = dateStr;

            // Update greeting based on hour
            const hour = now.getHours();
            let greetingText = 'Welcome,';
            if (hour >= 5 && hour < 12) {
                greetingText = 'Good Morning,';
            } else if (hour >= 12 && hour < 18) {
                greetingText = 'Good Afternoon,';
            } else if (hour >= 18 && hour < 22) {
                greetingText = 'Good Evening,';
            } else {
                greetingText = 'Good Night,';
            }
            
            document.getElementById('greeting').textContent = greetingText;
        }

        // Initialize immediately to avoid flash of basic text
        updateTime();
        
        // Refresh every second
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
